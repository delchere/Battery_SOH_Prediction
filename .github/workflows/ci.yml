name: CI/CD Pipeline (SAST → BUILD → TEST → DEPLOY)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================================
  # ÉTAPE 1 : SAST - Static Application Security Testing
  # ============================================================
  sast:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install bandit
        run: pip install bandit

      - name: Run security scan
        run: bandit src/ -r -ll

  # ============================================================
  # ÉTAPE 2 : BUILD - Construire l'image Docker
  # ============================================================
  build:
    needs: sast
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: docker build -t battery-soh:${{ github.sha }} .

      - name: Save Docker image
        run: docker save battery-soh:${{ github.sha }} -o /tmp/image.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  # ============================================================
  # ÉTAPE 3 : TEST - Lancer les tests unitaires
  # ============================================================
  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Train model
        run: |
          python src/data_processor.py
          python src/extract_test_cycles.py
          python src/train.py

      - name: Run unit tests
        run: pytest tests/ -v --cov=src

  # ============================================================
  # ÉTAPE 4 : DEPLOY - Déclencher le déploiement sur Render
  # ============================================================
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST \
            https://api.render.com/deploy/srv-${{ secrets.RENDER_SERVICE_ID }} \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json"