name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas numpy scipy scikit-learn
        pip install flask flask-cors python-dotenv joblib openpyxl
        pip install pytest pytest-cov
    
    - name: Create directories
      run: |
        mkdir -p data/processed data/tests models_saved
    
    - name: Run tests
      run: |
        pytest tests/ -v