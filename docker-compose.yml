version: '3.8'

services:
  api:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATA_PATH=/app/data
      - MODELS_PATH=/app/models_saved
    volumes:
      - ./models_saved:/app/models_saved
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
  
  # Optionnel : Base de données pour stocker les prédictions
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: soh_user
      POSTGRES_PASSWORD: soh_password
      POSTGRES_DB: soh_predictions
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped

volumes:
  postgres_data: